<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🌿 Ricette Vegetariane</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --green-dark: #2D5016;
  --green-mid: #4A7C2F;
  --green-light: #7AB648;
  --green-pale: #D4EDBA;
  --cream: #FAFAF5;
  --cream-dark: #F0EFE6;
  --text: #1A1A1A;
  --text-muted: #666;
  --white: #FFFFFF;
  --shadow: 0 2px 12px rgba(0,0,0,0.10);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.18);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.2s ease;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--cream);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 32px;
}

/* HEADER */
#header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--green-dark);
  color: var(--white);
  padding: 12px 16px 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

#header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

#header h1 {
  font-size: 1.2rem;
  font-weight: 700;
  letter-spacing: -0.3px;
}

#count-badge {
  font-size: 0.75rem;
  background: var(--green-light);
  color: var(--white);
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
  white-space: nowrap;
}

#search-wrap {
  position: relative;
  margin-bottom: 10px;
}

#search {
  width: 100%;
  padding: 10px 40px 10px 14px;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 0.95rem;
  background: rgba(255,255,255,0.15);
  color: var(--white);
  outline: none;
  transition: background var(--transition);
}

#search::placeholder { color: rgba(255,255,255,0.6); }
#search:focus { background: rgba(255,255,255,0.22); }

#clear-btn {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
  font-size: 1.1rem;
  display: none;
  padding: 4px;
  line-height: 1;
}
#clear-btn.visible { display: block; }

/* FILTERS */
#filters {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 12px;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
#filters::-webkit-scrollbar { display: none; }

.filter-btn {
  flex-shrink: 0;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,0.4);
  background: transparent;
  color: rgba(255,255,255,0.85);
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.filter-btn:hover { background: rgba(255,255,255,0.15); }
.filter-btn.active {
  background: var(--white);
  color: var(--green-dark);
  border-color: var(--white);
  font-weight: 700;
}

/* GRID */
#grid {
  padding: 16px;
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
}

@media (min-width: 500px) { #grid { grid-template-columns: 1fr 1fr; } }
@media (min-width: 900px) { #grid { grid-template-columns: 1fr 1fr 1fr; gap: 16px; padding: 20px; } }

/* EMPTY STATE */
#empty {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 1rem;
  gap: 8px;
}
#empty.visible { display: flex; }
#empty-icon { font-size: 3rem; }

/* CARD */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  cursor: pointer;
  transition: transform var(--transition), box-shadow var(--transition);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  -webkit-tap-highlight-color: transparent;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
.card:active { transform: scale(0.98); }

.card-body { padding: 14px 14px 10px; flex: 1; }

.card-name {
  font-size: 0.95rem;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 8px;
  color: var(--text);
}

.card-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
  align-items: center;
}

.cat-pill {
  font-size: 0.70rem;
  font-weight: 700;
  padding: 2px 9px;
  border-radius: 20px;
  letter-spacing: 0.2px;
}

.badge-uncertain {
  font-size: 0.70rem;
  padding: 2px 8px;
  border-radius: 20px;
  background: #FFF3CD;
  color: #856404;
  font-weight: 600;
}

.card-info {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 10px;
}

.card-info span {
  font-size: 0.75rem;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 3px;
}

.card-ingredients {
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.5;
  border-top: 1px solid var(--cream-dark);
  padding-top: 8px;
  margin-top: auto;
}

/* Categorie colori */
.cat-primi { background: #E3F2FD; color: #1565C0; }
.cat-secondi { background: #FCE4EC; color: #880E4F; }
.cat-contorni { background: #E8F5E9; color: #2E7D32; }
.cat-dolci { background: #FFF8E1; color: #F57F17; }
.cat-pane { background: #FBE9E7; color: #BF360C; }
.cat-salse { background: #EDE7F6; color: #4527A0; }
.cat-colazione { background: #E0F7FA; color: #006064; }

/* MODAL */
#overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 200;
  opacity: 0;
  transition: opacity 0.25s ease;
}
#overlay.open { display: block; opacity: 1; }

#modal {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 201;
  background: var(--white);
  border-radius: 20px 20px 0 0;
  max-height: 90vh;
  overflow-y: auto;
  transform: translateY(100%);
  opacity: 0;
  pointer-events: none;
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.25s ease;
  -webkit-overflow-scrolling: touch;
}
#modal.open { transform: translateY(0); opacity: 1; pointer-events: auto; }

@media (min-width: 700px) {
  #modal {
    left: 50%;
    right: auto;
    bottom: 50%;
    transform: translate(-50%, 50%) scale(0.95);
    width: 100%;
    max-width: 620px;
    border-radius: 20px;
    max-height: 85vh;
  }
  #modal.open { transform: translate(-50%, 50%) scale(1); opacity: 1; pointer-events: auto; }
}

#modal-handle {
  width: 36px; height: 4px;
  background: var(--cream-dark);
  border-radius: 2px;
  margin: 10px auto 0;
}

#modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 14px 18px 10px;
  position: sticky;
  top: 0;
  background: var(--white);
  border-bottom: 1px solid var(--cream-dark);
  gap: 12px;
}

#modal-title {
  font-size: 1.1rem;
  font-weight: 800;
  line-height: 1.3;
  flex: 1;
  color: var(--text);
}

#modal-close {
  background: var(--cream-dark);
  border: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--text);
  transition: background var(--transition);
}
#modal-close:hover { background: #e0e0d5; }

#modal-body { padding: 16px 18px 32px; }

.modal-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--cream-dark);
}

.meta-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 0.82rem;
  color: var(--text-muted);
  background: var(--cream);
  padding: 5px 11px;
  border-radius: 20px;
}

.uncertain-banner {
  background: #FFF3CD;
  border: 1px solid #FFD700;
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  margin-bottom: 14px;
  font-size: 0.82rem;
  color: #856404;
}

.modal-section-title {
  font-size: 0.78rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--green-dark);
  margin-bottom: 10px;
}

.ingredients-list {
  list-style: none;
  margin-bottom: 20px;
}
.ingredients-list li {
  padding: 6px 0;
  border-bottom: 1px solid var(--cream-dark);
  font-size: 0.88rem;
  line-height: 1.4;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.ingredients-list li::before {
  content: "▸";
  color: var(--green-light);
  flex-shrink: 0;
  margin-top: 1px;
}
.ingredients-list li:last-child { border-bottom: none; }

.preparation-text {
  font-size: 0.88rem;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 20px;
  white-space: pre-line;
}

.notes-box {
  background: var(--cream);
  border-left: 3px solid var(--green-light);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 10px 14px;
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.5;
}

.highlight { background: #FFEB3B; border-radius: 2px; padding: 0 1px; }

/* IMAGE STRIP */
.img-strip {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--cream-dark);
}
.img-thumb-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  border: 1.5px solid var(--green-light);
  background: var(--cream);
  color: var(--green-dark);
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.img-thumb-btn:hover { background: var(--green-pale); }

/* LIGHTBOX */
#lightbox {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 400;
  background: rgba(0,0,0,0.92);
  align-items: center;
  justify-content: center;
}
#lightbox.open { display: flex; }

#lightbox-img {
  max-width: 95vw;
  max-height: 85vh;
  object-fit: contain;
  border-radius: 4px;
  user-select: none;
  -webkit-user-select: none;
}

#lightbox-counter {
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  color: rgba(255,255,255,0.8);
  font-size: 0.85rem;
  font-weight: 600;
  background: rgba(0,0,0,0.45);
  padding: 4px 14px;
  border-radius: 20px;
  white-space: nowrap;
}

#lightbox-close {
  position: absolute;
  top: 12px;
  right: 16px;
  background: rgba(255,255,255,0.18);
  border: none;
  color: #fff;
  width: 38px; height: 38px;
  border-radius: 50%;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
}
#lightbox-close:hover { background: rgba(255,255,255,0.3); }

.lb-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.15);
  border: none;
  color: #fff;
  width: 46px; height: 46px;
  border-radius: 50%;
  font-size: 1.6rem;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.lb-nav:hover { background: rgba(255,255,255,0.28); }
.lb-nav:disabled { opacity: 0.25; cursor: default; }
#lb-prev { left: 12px; }
#lb-next { right: 12px; }
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <h1>🌿 Ricette Vegetariane</h1>
    <span id="count-badge">92 ricette</span>
  </div>
  <div id="search-wrap">
    <input type="search" id="search" placeholder="Cerca ricetta o ingrediente..." autocomplete="off" />
    <button id="clear-btn" aria-label="Pulisci ricerca">✕</button>
  </div>
  <div id="filters">
    <button class="filter-btn active" data-cat="Tutte">Tutte</button>
    <button class="filter-btn" data-cat="Primi">🍝 Primi</button>
    <button class="filter-btn" data-cat="Secondi">🥗 Secondi</button>
    <button class="filter-btn" data-cat="Contorni">🥦 Contorni</button>
    <button class="filter-btn" data-cat="Dolci">🍰 Dolci</button>
    <button class="filter-btn" data-cat="Pane & Pizza">🍕 Pane & Pizza</button>
    <button class="filter-btn" data-cat="Salse & Condimenti">🫙 Salse</button>
    <button class="filter-btn" data-cat="Colazione">☕ Colazione</button>
  </div>
</div>

<div id="grid"></div>
<div id="empty"><div id="empty-icon">🔍</div><span>Nessuna ricetta trovata</span></div>

<div id="lightbox">
  <button id="lightbox-close" aria-label="Chiudi">✕</button>
  <div id="lightbox-counter"></div>
  <img id="lightbox-img" src="" alt="Immagine ricetta">
  <button class="lb-nav" id="lb-prev" aria-label="Precedente">&#8249;</button>
  <button class="lb-nav" id="lb-next" aria-label="Successiva">&#8250;</button>
</div>

<div id="overlay"></div>
<div id="modal">
  <div id="modal-handle"></div>
  <div id="modal-header">
    <div id="modal-title"></div>
    <button id="modal-close">✕</button>
  </div>
  <div id="modal-body"></div>
</div>

]/*RE*/;

const catClass = {
  'Primi': 'cat-primi',
  'Secondi': 'cat-secondi',
  'Contorni': 'cat-contorni',
  'Dolci': 'cat-dolci',
  'Pane & Pizza': 'cat-pane',
  'Salse & Condimenti': 'cat-salse',
  'Colazione': 'cat-colazione'
};

let activeCategory = 'Tutte';
let searchQuery = '';
let debounceTimer = null;

const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const countBadge = document.getElementById('count-badge');
const searchInput = document.getElementById('search');
const clearBtn = document.getElementById('clear-btn');
const overlay = document.getElementById('overlay');
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modal-title');
const modalBody = document.getElementById('modal-body');

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, query) {
  if (!query || query.length < 2) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return escaped.replace(re, '<mark class="highlight">$1</mark>');
}

function renderCards() {
  const q = searchQuery.toLowerCase();
  const filtered = recipes.filter(r => {
    const matchCat = activeCategory === 'Tutte' || r.category === activeCategory;
    if (!matchCat) return false;
    if (!q) return true;
    return r.name.toLowerCase().includes(q) ||
           r.ingredients.some(i => i.toLowerCase().includes(q)) ||
           r.preparation.toLowerCase().includes(q);
  });

  countBadge.textContent = filtered.length === recipes.length
    ? `${recipes.length} ricette`
    : `${filtered.length} di ${recipes.length}`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.classList.add('visible');
    return;
  }
  empty.classList.remove('visible');

  grid.innerHTML = filtered.map(r => {
    const ings = r.ingredients.slice(0, 3).map(i => highlight(i, q)).join(', ');
    const moreIngs = r.ingredients.length > 3 ? ` <em>+${r.ingredients.length - 3} altri</em>` : '';
    const infoItems = [
      r.prep_time ? `⏱ ${escapeHtml(r.prep_time)}` : '',
      r.cook_time ? `🍳 ${escapeHtml(r.cook_time)}` : '',
      r.servings ? `👥 ${escapeHtml(r.servings)}` : '',
    ].filter(Boolean).map(s => `<span>${s}</span>`).join('');

    return `<article class="card" onclick="openRecipe(${r.id})" role="button" tabindex="0" aria-label="${escapeHtml(r.name)}">
  <div class="card-body">
    <div class="card-name">${highlight(r.name, q)}</div>
    <div class="card-meta">
      <span class="cat-pill ${catClass[r.category] || 'cat-contorni'}">${escapeHtml(r.category)}</span>
      ${r.uncertain ? '<span class="badge-uncertain">⚠️ incompleta</span>' : ''}
    </div>
    ${infoItems ? `<div class="card-info">${infoItems}</div>` : ''}
    ${ings ? `<div class="card-ingredients">${ings}${moreIngs}</div>` : ''}
  </div>
</article>`;
  }).join('');
}

function openRecipe(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  modalTitle.textContent = r.name;

  const metaItems = [
    r.prep_time ? `⏱ ${escapeHtml(r.prep_time)}` : '',
    r.cook_time ? `🍳 ${escapeHtml(r.cook_time)}` : '',
    r.servings ? `👥 ${escapeHtml(r.servings)}` : '',
    r.temperature ? `🌡 ${escapeHtml(r.temperature)}` : '',
  ].filter(Boolean).map(s => `<div class="meta-item">${s}</div>`).join('');

  const ingsList = r.ingredients.map(i => `<li>${escapeHtml(i)}</li>`).join('');

  window._lbSources = r.sources && r.sources.length ? r.sources : [];
  const imgStrip = window._lbSources.length > 0
    ? `<div class="img-strip">${window._lbSources.map((src, i) =>
        `<button class="img-thumb-btn" onclick="openLightbox(${i})">📷 ${window._lbSources.length > 1 ? `Foto ${i + 1}` : 'Vedi foto'}</button>`
      ).join('')}</div>`
    : '';

  modalBody.innerHTML = `
    ${imgStrip}
    ${r.uncertain ? `<div class="uncertain-banner">⚠️ Ricetta potenzialmente incompleta: ${escapeHtml(r.uncertainty_reason || 'testo non completamente leggibile')}</div>` : ''}
    ${metaItems ? `<div class="modal-meta">${metaItems}</div>` : ''}
    ${ingsList ? `<p class="modal-section-title">Ingredienti</p><ul class="ingredients-list">${ingsList}</ul>` : ''}
    ${r.preparation ? `<p class="modal-section-title">Preparazione</p><div class="preparation-text">${escapeHtml(r.preparation)}</div>` : ''}
    ${r.notes ? `<p class="modal-section-title">Note</p><div class="notes-box">${escapeHtml(r.notes)}</div>` : ''}
  `;

  overlay.classList.add('open');
  setTimeout(() => modal.classList.add('open'), 10);
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modal.classList.remove('open');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

overlay.addEventListener('click', closeModal);
document.getElementById('modal-close').addEventListener('click', closeModal);

// Lightbox
let lbIndex = 0;
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbCounter = document.getElementById('lightbox-counter');
const lbPrev = document.getElementById('lb-prev');
const lbNext = document.getElementById('lb-next');

function openLightbox(index) {
  const srcs = window._lbSources || [];
  if (!srcs.length) return;
  lbIndex = index;
  updateLightbox();
  lightbox.classList.add('open');
}

function closeLightbox() {
  lightbox.classList.remove('open');
}

function updateLightbox() {
  const srcs = window._lbSources || [];
  lbImg.src = srcs[lbIndex];
  if (srcs.length > 1) {
    lbCounter.textContent = `${lbIndex + 1} / ${srcs.length}`;
    lbCounter.style.display = '';
    lbPrev.style.display = '';
    lbNext.style.display = '';
    lbPrev.disabled = lbIndex === 0;
    lbNext.disabled = lbIndex === srcs.length - 1;
  } else {
    lbCounter.style.display = 'none';
    lbPrev.style.display = 'none';
    lbNext.style.display = 'none';
  }
}

document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
lbPrev.addEventListener('click', () => { if (lbIndex > 0) { lbIndex--; updateLightbox(); } });
lbNext.addEventListener('click', () => { const n = (window._lbSources||[]).length; if (lbIndex < n - 1) { lbIndex++; updateLightbox(); } });

document.addEventListener('keydown', e => {
  if (lightbox.classList.contains('open')) {
    if (e.key === 'Escape') { closeLightbox(); return; }
    if (e.key === 'ArrowLeft' && lbIndex > 0) { lbIndex--; updateLightbox(); return; }
    if (e.key === 'ArrowRight') { const n = (window._lbSources||[]).length; if (lbIndex < n - 1) { lbIndex++; updateLightbox(); } return; }
  }
  if (e.key === 'Escape') closeModal();
});

// Touch swipe down to close
let touchStartY = 0;
modal.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, {passive: true});
modal.addEventListener('touchend', e => {
  if (e.changedTouches[0].clientY - touchStartY > 80) closeModal();
}, {passive: true});

// Search
searchInput.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(() => {
    searchQuery = searchInput.value.trim();
    clearBtn.classList.toggle('visible', searchQuery.length > 0);
    renderCards();
  }, 150);
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  searchQuery = '';
  clearBtn.classList.remove('visible');
  renderCards();
  searchInput.focus();
});

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelector('.filter-btn.active').classList.remove('active');
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    renderCards();
  });
});

// Keyboard nav on cards
grid.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    const card = e.target.closest('.card');
    if (card) card.click();
  }
});

// Init
renderCards();
</script>
